<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Mango Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --gold: #d4af37;
            --gold-dark: #aa8c2c;
            --gold-glow: rgba(212, 175, 55, 0.2);
            --bg: #080808;
            --glass: rgba(14, 14, 14, 0.88);
            --border: rgba(212, 175, 55, 0.15);
            --text: #f8fafc;
            --muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            font-family: 'Inter', sans-serif;
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ========== BACKGROUND ========== */
        .bg-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: radial-gradient(ellipse at 70% 30%, rgba(212, 175, 55, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 20% 80%, rgba(212, 175, 55, 0.04) 0%, transparent 50%);
        }

        .bg-grid {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image:
                linear-gradient(rgba(212, 175, 55, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(212, 175, 55, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        /* ========== STAGE ========== */
        .stage {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            overflow: hidden;
        }

        /* ========== PERSON ========== */
        .person {
            position: absolute;
            bottom: 50%;
            transform: translateY(80%) translateX(-130vw);
            width: 80px;
            height: 160px;
            z-index: 30;
            /* Phase 1: Run in from left, stop left of center */
            /* Phase 2: Move right dragging card */
        }

        /* person body parts */
        .person .head {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 36px;
            height: 36px;
            background: #f5c8a0;
            border-radius: 50%;
            border: 2px solid #e8aa7a;
            z-index: 5;
        }

        /* hair */
        .person .head::before {
            content: '';
            position: absolute;
            top: -6px;
            left: 2px;
            width: 32px;
            height: 20px;
            background: #3d2b1f;
            border-radius: 50% 50% 30% 30%;
        }

        /* face – neutral during run */
        .person .face {
            position: absolute;
            top: 14px;
            left: 50%;
            transform: translateX(-50%);
            width: 24px;
            z-index: 6;
        }

        .person .eye {
            position: absolute;
            width: 5px;
            height: 5px;
            background: #1a1a1a;
            border-radius: 50%;
            top: 0;
        }

        .person .eye.l {
            left: 2px;
        }

        .person .eye.r {
            right: 2px;
        }

        .person .mouth {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 10px;
            height: 4px;
            border-bottom: 2.5px solid #c0704a;
            border-radius: 0 0 10px 10px;
        }

        /* torso */
        .person .torso {
            position: absolute;
            top: 36px;
            left: 50%;
            transform: translateX(-50%);
            width: 28px;
            height: 48px;
            background: linear-gradient(180deg, var(--gold) 0%, var(--gold-dark) 100%);
            border-radius: 6px 6px 4px 4px;
        }

        /* collar */
        .person .torso::before {
            content: '';
            position: absolute;
            top: 2px;
            left: 50%;
            transform: translateX(-50%);
            width: 10px;
            height: 8px;
            background: var(--bg);
            border-radius: 0 0 6px 6px;
        }

        /* arms */
        .person .arm {
            position: absolute;
            width: 10px;
            height: 38px;
            background: #f5c8a0;
            border-radius: 5px;
            top: 36px;
            transform-origin: top center;
        }

        .person .arm.l {
            left: 12px;
            animation: armSwingL 0.45s infinite alternate ease-in-out;
        }

        .person .arm.r {
            right: 12px;
            animation: armSwingR 0.45s infinite alternate ease-in-out;
        }

        /* legs */
        .person .leg {
            position: absolute;
            width: 12px;
            height: 44px;
            background: #2c3e50;
            border-radius: 6px;
            bottom: 0;
            transform-origin: top center;
        }

        .person .leg.l {
            left: 20px;
            animation: legSwingL 0.45s infinite alternate ease-in-out;
        }

        .person .leg.r {
            right: 20px;
            animation: legSwingR 0.45s infinite alternate ease-in-out;
        }

        /* shoes */
        .person .shoe {
            position: absolute;
            width: 18px;
            height: 8px;
            background: #1a1a1a;
            border-radius: 9px 9px 4px 4px;
            bottom: 0;
        }

        .person .shoe.l {
            left: 14px;
        }

        .person .shoe.r {
            right: 14px;
        }

        /* ===== THUMBS UP ARM (hidden initially) ===== */
        .person .arm-up {
            position: absolute;
            width: 10px;
            height: 38px;
            background: #f5c8a0;
            border-radius: 5px;
            top: 36px;
            right: 12px;
            transform-origin: top center;
            transform: rotate(-140deg);
            display: none;
        }

        .person .thumb {
            position: absolute;
            width: 14px;
            height: 14px;
            background: #f5c8a0;
            border-radius: 50% 50% 50% 20%;
            bottom: -4px;
            left: 50%;
            transform: translateX(-50%);
            border: 1.5px solid #e8aa7a;
        }

        /* ===== WALK / RUN ANIMATIONS ===== */
        @keyframes legSwingL {
            from {
                transform: rotate(-30deg);
            }

            to {
                transform: rotate(30deg);
            }
        }

        @keyframes legSwingR {
            from {
                transform: rotate(30deg);
            }

            to {
                transform: rotate(-30deg);
            }
        }

        @keyframes armSwingL {
            from {
                transform: rotate(30deg);
            }

            to {
                transform: rotate(-30deg);
            }
        }

        @keyframes armSwingR {
            from {
                transform: rotate(-30deg);
            }

            to {
                transform: rotate(30deg);
            }
        }

        /* body bob while running */
        @keyframes bodyBob {

            0%,
            100% {
                transform: translateY(80%) translateX(var(--tx, -130vw)) scaleY(1);
            }

            50% {
                transform: translateY(calc(80% - 6px)) translateX(var(--tx, -130vw)) scaleY(1.02);
            }
        }

        /* ===== PERSON MOVEMENT PHASES ===== */
        /* Phase 1: run from off-screen left → stop at left of center-ish */
        .person.phase-1 {
            animation: runIn 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        @keyframes runIn {
            from {
                transform: translateY(80%) translateX(-130vw);
            }

            to {
                transform: translateY(80%) translateX(-280px);
            }
        }

        /* Phase 2: walk right, grab card, drag it in */
        .person.phase-2 {
            animation: walkRight 1.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
            transform: translateY(80%) translateX(-280px);
        }

        @keyframes walkRight {
            from {
                transform: translateY(80%) translateX(-280px);
            }

            to {
                transform: translateY(80%) translateX(-80px);
            }
        }

        /* Phase 3: subtle idle bounce */
        .person.phase-3 {
            animation: idleBob 0.7s ease-in-out infinite alternate;
            transform: translateY(80%) translateX(-80px);
        }

        @keyframes idleBob {
            from {
                transform: translateY(80%) translateX(-80px);
            }

            to {
                transform: translateY(calc(80% - 5px)) translateX(-80px);
            }
        }

        /* ===== SMILE ANIMATION ===== */
        .person.smiling .mouth {
            border-bottom: 2.5px solid #c0704a;
            border-radius: 0 0 10px 10px;
            width: 14px;
            height: 6px;
        }

        /* =========================================
           LOGIN CARD
        ========================================= */
        .login-card {
            position: relative;
            z-index: 20;
            width: 420px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 3rem 2.5rem;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(212, 175, 55, 0.08);
            backdrop-filter: blur(6px);
            /* Start off-screen RIGHT */
            transform: translateX(200vw);
            transition: transform 1.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            will-change: transform;
        }

        .login-card.slide-in {
            transform: translateX(0);
        }

        /* gold top bar */
        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 10%;
            right: 10%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            border-radius: 2px;
        }

        .card-logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .card-logo .mark {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--gold);
            width: 64px;
            height: 64px;
            line-height: 60px;
            border: 1.5px solid var(--gold);
            border-radius: 50%;
            margin: 0 auto 0.75rem;
            letter-spacing: -2px;
        }

        .card-logo h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 400;
            letter-spacing: 2px;
        }

        .card-logo p {
            font-size: 0.75rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: var(--muted);
            margin-top: 0.2rem;
        }

        .choice-btns {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 2rem;
        }

        .choice-btn {
            flex: 1;
            padding: 0.7rem;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.04);
            color: var(--muted);
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .choice-btn.active,
        .choice-btn:hover {
            border-color: var(--gold);
            color: var(--gold);
            background: rgba(212, 175, 55, 0.07);
        }

        .field {
            position: relative;
            margin-bottom: 1.25rem;
        }

        .field i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            font-size: 0.95rem;
            pointer-events: none;
        }

        .field input,
        .field select {
            width: 100%;
            padding: 1rem 1rem 1rem 2.8rem;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
            appearance: none;
        }

        .field input::placeholder {
            color: var(--muted);
        }

        .field input:focus,
        .field select:focus {
            border-color: var(--gold);
            background: rgba(0, 0, 0, 0.6);
            box-shadow: 0 0 0 3px var(--gold-glow);
        }

        .field select option {
            background: #111;
            color: #fff;
        }

        .eye-toggle {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            transition: color 0.2s;
        }

        .eye-toggle:hover {
            color: var(--gold);
        }

        .btn-submit {
            width: 100%;
            padding: 1.1rem;
            margin-top: 0.5rem;
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
            border: none;
            border-radius: 12px;
            color: #111;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(212, 175, 55, 0.3);
        }

        .btn-submit::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -60%;
            width: 40%;
            height: 200%;
            background: rgba(255, 255, 255, 0.25);
            transform: skewX(-20deg);
            transition: left 0.5s ease;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(212, 175, 55, 0.4);
        }

        .btn-submit:hover::after {
            left: 160%;
        }

        .err-box {
            background: rgba(220, 53, 69, 0.1);
            border: 1px solid rgba(220, 53, 69, 0.3);
            border-radius: 8px;
            color: #ff6b6b;
            padding: 0.7rem 1rem;
            font-size: 0.83rem;
            text-align: center;
            margin-bottom: 1rem;
            display: none;
        }

        /* ===== COMPLETION BURST ===== */
        .burst {
            position: absolute;
            pointer-events: none;
            z-index: 100;
        }

        .burst span {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--gold);
            animation: burstOut 0.8s ease-out forwards;
        }

        @keyframes burstOut {
            from {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }

            to {
                transform: var(--dir) scale(0);
                opacity: 0;
            }
        }
    </style>
</head>

<body>

    <!-- Background -->
    <div class="bg-layer"></div>
    <div class="bg-grid"></div>

    <!-- STAGE -->
    <div class="stage" id="stage">

        <!-- ===== CSS PERSON ===== -->
        <div class="person" id="person">
            <!-- Head & Face -->
            <div class="head">
                <div class="face">
                    <div class="eye l"></div>
                    <div class="eye r"></div>
                    <div class="mouth" id="mouth"></div>
                </div>
            </div>
            <!-- Torso -->
            <div class="torso"></div>
            <!-- Arms -->
            <div class="arm l" id="armL"></div>
            <div class="arm r" id="armR"></div>
            <!-- Thumbs-up arm (hidden until phase 3) -->
            <div class="arm-up" id="armUp">
                <div class="thumb"></div>
            </div>
            <!-- Legs -->
            <div class="leg l" id="legL"></div>
            <div class="leg r" id="legR"></div>
            <!-- Shoes -->
            <div class="shoe l"></div>
            <div class="shoe r"></div>
        </div>

        <!-- ===== LOGIN CARD ===== -->
        <div class="login-card" id="loginCard">
            <div class="card-logo">
                <div class="mark">BM</div>
                <h2>Black Mango</h2>
                <p>Studio</p>
            </div>

            <!-- Staff / Admin toggle -->
            <div class="choice-btns">
                <button class="choice-btn active" onclick="switchRole('staff', this)">
                    <i class="fas fa-user"></i> Staff
                </button>
                <button class="choice-btn" onclick="switchRole('admin', this)">
                    <i class="fas fa-shield-halved"></i> Admin
                </button>
            </div>

            <!-- Error box -->
            <div class="err-box" id="errBox"></div>

            <!-- STAFF FORM -->
            <form id="staffForm" onsubmit="handleLogin(event)">
                <div class="field">
                    <i class="fas fa-user"></i>
                    <input type="text" id="staffUser" placeholder="Username" autocomplete="off" required>
                </div>
                <div class="field">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="staffPass" placeholder="Password" autocomplete="off" required>
                    <button type="button" class="eye-toggle" onclick="togglePass('staffPass',this)">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                <button class="btn-submit" type="submit">
                    <i class="fas fa-arrow-right-to-bracket"></i> Sign In
                </button>
            </form>

            <!-- ADMIN FORM -->
            <form id="adminForm" style="display:none" onsubmit="handleLogin(event)">
                <div class="field">
                    <i class="fas fa-user-shield"></i>
                    <input type="text" id="adminUser" placeholder="Admin Username" autocomplete="off" required>
                </div>
                <div class="field">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="adminPass" placeholder="Admin Password" autocomplete="off" required>
                    <button type="button" class="eye-toggle" onclick="togglePass('adminPass',this)">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                <div class="field">
                    <i class="fas fa-key"></i>
                    <select id="adminSeason" required>
                        <option value="" disabled selected>Select Season</option>
                        <option value="SS">SS – Spring / Summer</option>
                        <option value="AW">AW – Autumn / Winter</option>
                        <option value="Resort">Resort</option>
                        <option value="Pre-Fall">Pre-Fall</option>
                    </select>
                </div>
                <button class="btn-submit" type="submit">
                    <i class="fas fa-arrow-right-to-bracket"></i> Admin Access
                </button>
            </form>
        </div>

    </div>

    <script>
        /* =========================================
           ANIMATION SEQUENCE
        ========================================= */
        const person = document.getElementById('person');
        const card = document.getElementById('loginCard');
        const armL = document.getElementById('armL');
        const armR = document.getElementById('armR');
        const armUp = document.getElementById('armUp');
        const legL = document.getElementById('legL');
        const legR = document.getElementById('legR');
        const mouth = document.getElementById('mouth');

        function startAnimation() {

            // --- PHASE 1: Person runs in from left ---
            setTimeout(() => {
                person.classList.add('phase-1');
            }, 400);

            // --- PHASE 2: Card slides in from right simultaneously with person walking right ---
            setTimeout(() => {
                person.classList.remove('phase-1');
                void person.offsetWidth; // reflow
                person.classList.add('phase-2');
                // Card slides in from right
                card.classList.add('slide-in');
            }, 1700);

            // --- PHASE 3: Person reaches idle position, smile + thumbs up ---
            setTimeout(() => {
                person.classList.remove('phase-2');
                void person.offsetWidth;
                person.classList.add('phase-3');

                // Stop leg animations
                legL.style.animation = 'none';
                legR.style.animation = 'none';
                legL.style.transform = 'rotate(0deg)';
                legR.style.transform = 'rotate(0deg)';

                // Raise right arm for thumbs up
                armL.style.animation = 'none';
                armR.style.animation = 'none';
                armR.style.display = 'none';
                armUp.style.display = 'block';
                armUp.style.animation = 'thumbUp 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards';

                // Smile
                person.classList.add('smiling');
                mouth.style.width = '16px';
                mouth.style.height = '8px';
                mouth.style.borderColor = '#c0704a';

                // Burst particles
                spawnBurst();

            }, 3200);
        }

        /* ===== BURST PARTICLES ===== */
        function spawnBurst() {
            const stage = document.getElementById('stage');
            const burst = document.createElement('div');
            burst.className = 'burst';
            // position near person
            burst.style.left = 'calc(50% - 100px)';
            burst.style.top = 'calc(50% - 60px)';

            const dirs = [
                'translate(-60px,-80px)', 'translate(0,-90px)', 'translate(60px,-80px)',
                'translate(80px,0)', 'translate(60px,60px)', 'translate(-60px,60px)',
                'translate(-80px,0)', 'translate(-40px,-90px)', 'translate(40px,-90px)'
            ];
            dirs.forEach((d, i) => {
                const dot = document.createElement('span');
                dot.style.cssText = `
                --dir: ${d};
                animation-delay: ${i * 0.04}s;
                background: ${i % 2 === 0 ? '#d4af37' : '#fff'};
            `;
                burst.appendChild(dot);
            });
            stage.appendChild(burst);
            setTimeout(() => burst.remove(), 1200);
        }

        /* inject thumbUp keyframe */
        const ks = document.createElement('style');
        ks.textContent = `
        @keyframes thumbUp {
            from { transform: rotate(0deg); }
            to   { transform: rotate(-140deg); }
        }
    `;
        document.head.appendChild(ks);

        window.addEventListener('load', startAnimation);

        /* =========================================
           FORM LOGIC
        ========================================= */
        let currentRole = 'staff';

        function switchRole(role, btn) {
            currentRole = role;
            document.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('staffForm').style.display = role === 'staff' ? 'block' : 'none';
            document.getElementById('adminForm').style.display = role === 'admin' ? 'block' : 'none';
            document.getElementById('errBox').style.display = 'none';
        }

        function togglePass(id, btn) {
            const inp = document.getElementById(id);
            const ico = btn.querySelector('i');
            if (inp.type === 'password') {
                inp.type = 'text';
                ico.className = 'fas fa-eye-slash';
            } else {
                inp.type = 'password';
                ico.className = 'fas fa-eye';
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            const errBox = document.getElementById('errBox');
            errBox.style.display = 'none';

            let payload = {};
            if (currentRole === 'staff') {
                payload = {
                    username: document.getElementById('staffUser').value.trim(),
                    password: document.getElementById('staffPass').value,
                    role: 'staff'
                };
            } else {
                payload = {
                    username: document.getElementById('adminUser').value.trim(),
                    password: document.getElementById('adminPass').value,
                    season: document.getElementById('adminSeason').value,
                    role: 'admin'
                };
            }

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (res.ok && data.success) {
                    window.location.href = '/';
                } else {
                    errBox.textContent = data.error || 'Invalid credentials. Please try again.';
                    errBox.style.display = 'block';
                }
            } catch {
                // Fallback: just go to home (no auth implemented yet)
                window.location.href = '/';
            }
        }
    </script>
</body>

</html>
